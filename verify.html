<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EIRI - Confirming your spot</title>
  <link rel="icon" type="image/png" href="images/eirifavicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0B0F1A; --panel: #121826; --text: #E8EDF5; --line: rgba(232,237,245,0.14); }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Urbanist", ui-sans-serif, system-ui; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { width: min(480px, 92vw); padding: 48px 40px; border: 1px solid var(--line); border-radius: 18px; background: var(--panel); text-align: center; display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .logo { width: 80px; opacity: 0.9; margin-bottom: 8px; }
    h1 { margin: 0; font-size: 26px; font-weight: 600; }
    p { margin: 0; font-size: 15px; font-weight: 300; color: rgba(232,237,245,0.6); line-height: 1.6; }
    .icon { width: 48px; height: 48px; color: rgba(232,237,245,0.7); }
    .icon svg { width: 48px; height: 48px; stroke: currentColor; fill: none; stroke-width: 1.5; stroke-linecap: round; stroke-linejoin: round; }
    a { color: rgba(232,237,245,0.6); font-size: 13px; text-decoration: none; border-bottom: 1px solid rgba(232,237,245,0.2); }
    a:hover { color: var(--text); }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="images/EIRIWHITELOGOBIG.png" alt="EIRI" />
    <div class="icon" id="icon">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 3"/></svg>
    </div>
    <h1 id="title">Confirming your spot...</h1>
    <p id="message">Just a second.</p>
    <a href="/" id="homelink" style="display:none">Back to eirisleep.com</a>
  </div>

  <script>
    const SUPABASE_URL = 'https://jamfflkocebwrqnsascq.supabase.co'

    async function verify() {
      const token = new URLSearchParams(window.location.search).get('token')
      const icon = document.getElementById('icon')
      const title = document.getElementById('title')
      const message = document.getElementById('message')
      const homelink = document.getElementById('homelink')

      const svgCheck = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m9 12 2 2 4-4"/></svg>`
      const svgX = `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="m15 9-6 6M9 9l6 6"/></svg>`

      if (!token) {
        icon.innerHTML = svgX
        title.textContent = 'Invalid link.'
        message.textContent = 'This verification link is not valid.'
        homelink.style.display = 'inline'
        return
      }

      try {
        const res = await fetch(`${SUPABASE_URL}/functions/v1/verify?token=${token}`)
        const data = await res.json()

        if (data.message === 'verified') {
          icon.innerHTML = svgCheck
          title.textContent = "You're in."
          message.textContent = "Your spot on the EIRI early list is confirmed. You'll hear from us first."
        } else {
          icon.innerHTML = svgX
          title.textContent = 'Something went wrong.'
          message.textContent = 'This link may have already been used or has expired.'
        }
      } catch (e) {
        icon.innerHTML = svgX
        title.textContent = 'Something went wrong.'
        message.textContent = 'Please try again or contact thoughts@eirisleep.com'
      }

      homelink.style.display = 'inline'
    }

    verify()
  </script>
</body>
</html>
